name: stable-check

on:
  push:
    branches:
      - main
      - master
  pull_request:
  merge_group:

jobs:
  stable-check:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: ./.github/actions/setup

      - name: Check formatting
        timeout-minutes: 10
        run: cd moonxi-net && moon fmt && git diff --exit-code

      - name: Type check
        timeout-minutes: 10
        run: cd moonxi-net && moon check --target native --deny-warn

      - name: Verify interfaces
        timeout-minutes: 10
        run: cd moonxi-net && moon info --target native && git diff --exit-code

      - name: Run CPU tests
        timeout-minutes: 10
        run: cd moonxi-net && moon test --target native
